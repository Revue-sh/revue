image: python:3.12-slim

clone:
  depth: 1

definitions:
  caches:
    ci-venv:
      key:
        files:
          - requirements-ci.txt
          - packaging/revue_core/pyproject.toml
          - packaging/revue-ci/pyproject.toml
          - packaging/revue/pyproject.toml
      path: .venv
    # REVUE-393: the web suite needs the heavy FastAPI/uvicorn stack, which the
    # ci-venv deliberately omits. Keep it in a separate cache + venv (.venv-web)
    # so the lighter packaging/root steps are never bloated or slowed (AC4).
    web-venv:
      key:
        files:
          - src/web/requirements.txt
      path: .venv-web
    # REVUE-331: the activate round-trip e2e needs BOTH the web stack and the
    # three editable packages (plus Playwright), so its venv is keyed on both
    # dependency sources. Separate from web-venv/ci-venv so neither lean step
    # inherits the heavy combo.
    e2e-venv:
      key:
        files:
          - src/web/requirements.txt
          - packaging/revue_core/pyproject.toml
          - packaging/revue-ci/pyproject.toml
          - packaging/revue/pyproject.toml
      path: .venv-e2e

  steps:
    # -----------------------------------------------------------------------
    # Main-branch web promotion chain (REVUE-348): build one immutable image,
    # deploy it to staging, smoke-test, then manually promote that same image
    # to production and smoke-test again.
    # -----------------------------------------------------------------------
    # REVUE-352: DOCKER_BUILDKIT=0 is LOAD-BEARING. The docker:24.0.7-cli image
    # enables BuildKit by default, which tries to launch a privileged
    # buildx_buildkit_default container. Bitbucket Pipelines forbids
    # --privileged=true and rejects the build with "authorization denied by
    # plugin pipelines". Disabling BuildKit forces the legacy build path,
    # which does NOT require privileged mode. Do not remove this export or
    # "modernise" by re-enabling buildx without first confirming a
    # non-privileged build path works inside Bitbucket Pipelines.
    - step: &build-web-image-fly
        name: "Build Web Image → Fly Registry"
        clone:
          depth: 5
        image: docker:24.0.7-cli
        services:
          - docker
        script:
          - apk add --no-cache curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - export DOCKER_BUILDKIT=0
          - flyctl auth docker
          - docker build -t "$WEB_IMAGE" src/web
          - docker push "$WEB_IMAGE"

    - step: &deploy-web-staging
        name: "Deploy Web → Staging"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - cd src/web && flyctl deploy --app revue-staging --config fly.staging.toml --image "$WEB_IMAGE" --remote-only

    - step: &smoke-web-staging
        name: "Smoke Test → Staging"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - |
            set -eu
            CURL_RETRY_FLAGS="--retry 12 --retry-all-errors --connect-timeout 5 --max-time 20"

            assert_json_health() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
              if ! python3 -c 'import json, sys; raise SystemExit(json.load(open(sys.argv[1], encoding="utf-8")) != {"status": "ok"})' "$out"
              then
                echo "Unexpected health body from $1" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_200() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_422() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" -X POST "$1" -H 'content-type: application/json' -d '{}')"
              if [ "$code" != "422" ]; then
                echo "Expected 422 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            # REVUE-374: the version manifest must be 200 and structurally sound.
            # The route validates against the bundled schema and 5xx's on a bad
            # body, so a 200 already implies schema conformance; the python check
            # is belt-and-braces (schema_version, semver, 64-hex sha256, https url).
            assert_manifest() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
              if ! python3 -c 'import json,re,sys; m=json.load(open(sys.argv[1],encoding="utf-8")); w=m["artefacts"]["wheel"]; raise SystemExit(not (m.get("schema_version")==1 and bool(re.fullmatch(r"\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?", m.get("current_version") or "")) and bool(re.fullmatch(r"[0-9a-f]{64}", w.get("sha256") or "")) and str(w.get("url","")).startswith("https://") and "T" in (m.get("released_at") or "")))' "$out"
              then
                echo "Manifest from $1 failed structural validation" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_json_health "https://staging.revue.sh/health"
            assert_200 "https://api.staging.revue.sh/health"
            assert_422 "https://api.staging.revue.sh/license/validate"
            assert_422 "https://staging.revue.sh/api/license/validate"
            assert_manifest "https://staging.revue.sh/skills/manifest.json"

    # REVUE-409: ensure-exists provisioning of the staging-E2E accounts, run as
    # a dedicated PLAIN step BEFORE the E2E step. Idempotent: it signs up (or logs
    # in) each derived account (e2e-<state>@<domain>) with the shared
    # STAGING_E2E_PASSWORD, runs the activate round-trip, and drives the paid
    # states via SIGNED SYNTHETIC webhooks POSTed to /webhooks/stripe (no live
    # Stripe — STRIPE_WEBHOOK_SECRET signs the events; the price ids are carried in
    # them). It emits NO secrets — the E2E step reads each account's licence key at
    # runtime. A staging wipe is recovered by simply re-running this pipeline (no
    # Stripe objects exist to clean up; no manual secret re-paste).
    - step: &provision-staging-e2e
        name: "Provision → Staging E2E accounts"
        image: python:3.12-slim
        script:
          - export STAGING_BASE_URL=https://staging.revue.sh
          # Fail fast (and name the gap) if the shared provisioning secrets are missing.
          # STRIPE_WEBHOOK_SECRET + the price ids must MATCH the staging app's
          # deployed values, or the synthetic events fail signature/price resolution.
          - |
            set -eu
            missing=""
            for var in STAGING_E2E_PASSWORD STRIPE_WEBHOOK_SECRET STRIPE_PRICE_INDIE_MONTHLY STRIPE_PRICE_PRO_MONTHLY; do
              eval "val=\${$var:-}"
              if [ -z "$val" ]; then missing="$missing $var"; fi
            done
            if [ -n "$missing" ]; then
              echo "Missing required staging-E2E repository secret(s):$missing" >&2
              echo "Set them per docs/runbooks/staging-e2e-account.md before merge." >&2
              exit 1
            fi
          - pip install --quiet httpx
          # Ensure-exists (NOT --dry-run): make the required accounts exist in the
          # right state. No Stripe API key — the paid states are signed synthetic
          # webhooks verified by the staging app against STRIPE_WEBHOOK_SECRET.
          - python3 scripts/provision_staging_e2e.py

    # REVUE-409: post-merge Playwright E2E against the LIVE staging app. Reuses
    # the EXISTING src/web/tests/e2e/ suite verbatim — only E2E_BASE_URL and the
    # seeding strategy change. The conftest fixtures branch on E2E_BASE_URL and
    # resolve each STATE's ensure-exists account: e-mail is DERIVED
    # (e2e-<state>@<domain>), the password is the ONE shared STAGING_E2E_PASSWORD
    # secret, and the licence KEY is read back at RUNTIME (no per-state secrets,
    # since staging has no DB to seed). A PLAIN step (no trigger: manual) so a red
    # run is a HARD failure that halts the pipeline, blocking the manual
    # prod-promotion step below from ever becoming available.
    # The *provision-staging-e2e step above runs first and ensures the accounts
    # exist; the guard below fails fast on a missing shared secret rather than as
    # an opaque login timeout. See docs/runbooks/staging-e2e-account.md.
    - step: &e2e-web-staging
        name: "E2E → Staging"
        image: python:3.12-slim
        caches:
          - e2e-venv
        script:
          - export E2E_BASE_URL=https://staging.revue.sh
          # Fail fast (and name the gap) if the shared secret is missing. The
          # licence keys are read at runtime, so only the shared password is
          # required here (the provision step guards the Stripe secrets).
          - |
            set -eu
            missing=""
            for var in STAGING_E2E_PASSWORD; do
              eval "val=\${$var:-}"
              if [ -z "$val" ]; then missing="$missing $var"; fi
            done
            if [ -n "$missing" ]; then
              echo "Missing required staging-E2E repository secret(s):$missing" >&2
              echo "Set them per docs/runbooks/staging-e2e-account.md before merge." >&2
              exit 1
            fi
          - test -x .venv-e2e/bin/python || python3 -m venv .venv-e2e
          - export PATH="$PWD/.venv-e2e/bin:$PATH"
          - python3 -c "import fastapi, uvicorn" 2>/dev/null || pip install --quiet -r src/web/requirements.txt
          - python3 -c "import pytest_playwright" 2>/dev/null || pip install --quiet pytest-playwright
          - python3 -m playwright install --with-deps chromium
          # Full e2e suite headless against staging (chromium). TC-9: this
          # INCLUDES test_ci_setup_page.py (REVUE-407 staging parity).
          - cd src/web && python3 -m pytest tests/e2e -q --browser chromium

    # REVUE-419: the prod-deploy SCRIPT is anchored here (&prod-deploy-script) so
    # the API-triggerable `custom: deploy-production` pipeline reuses the exact
    # same deploy logic — the two paths CANNOT drift. The only difference between
    # the manual main-branch step and the custom step is `trigger: manual`
    # (present here, absent on the custom step where the API call IS the
    # authorization). Both deploy the SAME image: registry.fly.io/revue-staging
    # :${BITBUCKET_COMMIT}, built+pushed by the merge pipeline for that commit.
    - step: &deploy-web-production
        name: "Deploy Web → Production"
        trigger: manual
        script: &prod-deploy-script
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - cd src/web && flyctl deploy --app revue-io --config fly.toml --image "$WEB_IMAGE" --remote-only

    - step: &smoke-web-production
        name: "Smoke Test → Production"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - |
            set -eu
            CURL_RETRY_FLAGS="--retry 12 --retry-all-errors --connect-timeout 5 --max-time 20"

            assert_json_health() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
              if ! python3 -c 'import json, sys; raise SystemExit(json.load(open(sys.argv[1], encoding="utf-8")) != {"status": "ok"})' "$out"
              then
                echo "Unexpected health body from $1" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_200() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_422() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" -X POST "$1" -H 'content-type: application/json' -d '{}')"
              if [ "$code" != "422" ]; then
                echo "Expected 422 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_json_health "https://revue.sh/health"
            assert_200 "https://api.revue.sh/health"
            assert_422 "https://api.revue.sh/license/validate"
            assert_422 "https://revue.sh/api/license/validate"

    # -----------------------------------------------------------------------
    # Tests — install all three packages and exercise each test suite.
    # revue_core is the leaf; revue-ci + revue depend on it. Order matters:
    # editable installs of dependents must come after revue_core so import
    # resolution targets the local copy.
    # -----------------------------------------------------------------------
    - step: &run-tests
        name: "Run Tests"
        caches:
          - ci-venv
        script:
          # The base image is python:3.12-slim, which ships no git. One test
          # (test_local_run_wheel_paths.py::…repo_root_resolves_to_customer_repo,
          # added in REVUE-369) shells out to real `git init/add/commit` to build
          # a fake customer repo and assert the vendored local_run resolves
          # REPO_ROOT via `git rev-parse`. Install git so that customer-path
          # coverage actually runs instead of erroring with FileNotFoundError.
          - apt-get update && apt-get install -y --no-install-recommends git
          - test -x .venv/bin/python || python3 -m venv .venv
          - export PATH="$PWD/.venv/bin:$PATH"
          - python3 -c "import pytest, jsonschema, yaml" 2>/dev/null || pip install --quiet -r requirements-ci.txt
          # REVUE-405: --no-build-isolation reuses the cached venv's hatchling
          # (pinned in requirements-ci.txt) instead of a per-run PEP 517 build-
          # isolation fetch from PyPI, which bricked #1026-1028 on a warm cache.
          - pip install --quiet --no-build-isolation -e packaging/revue_core/ -e packaging/revue-ci/ -e packaging/revue/
          - python3 -m pytest packaging/revue_core/tests/ -q --rootdir=packaging/revue_core
          - python3 -m pytest packaging/revue-ci/tests/ -q --rootdir=packaging/revue-ci
          # REVUE-331: --ignore=packaging/revue/tests/e2e is LOAD-BEARING.
          # This step runs in the lean ci-venv (no fastapi/uvicorn/playwright);
          # the activate round-trip e2e imports all three at module/conftest
          # load, so collecting it here would error the whole step. It is run
          # for real in the dedicated &run-activate-e2e step instead. Mirrors
          # the --ignore=src/web/tests/e2e precedent in &run-web-tests.
          - python3 -m pytest packaging/revue/tests/ --ignore=packaging/revue/tests/e2e -q --rootdir=packaging/revue
          # REVUE-393: this step runs against requirements-ci.txt (no fastapi).
          # tests/test_activation_rate_limit.py imports fastapi at module top —
          # since the PR #206 importorskip stopgap was removed, it would error
          # at COLLECTION here. It is gated for real in the &run-web-tests step
          # instead (where fastapi is installed), so exclude it from this light
          # root run.
          - python3 -m pytest tests/ --ignore=tests/integration --ignore=tests/test_activation_rate_limit.py -q
          # REVUE-409: unit-test the pure plan-builder of the staging-E2E
          # provisioning script (scripts/provision_staging_e2e.py). It is pure
          # Python (httpx/stripe are lazy-imported only on a live run), so it
          # runs in this lean ci-venv with no extra deps.
          - python3 -m pytest scripts/tests/ -q
          # Fresh-venv smoke test (REVUE-310) — gated behind @pytest.mark.slow
          # so it doesn't run during local `pytest`, but CI runs it explicitly
          # so package-graph regressions surface before tag time.
          - python3 -m pytest tests/integration/ -m slow -q

    # -----------------------------------------------------------------------
    # REVUE-393: gate the FastAPI web suite (src/web/tests) on every pipeline
    # that runs the test suite — PRs, develop, main (pre-deploy), and tag
    # builds (pre-PyPI-publish) — so a web regression can never ship ungated.
    # The root &run-tests step runs against requirements-ci.txt, which omits the
    # web-app deps (fastapi/uvicorn/starlette), so it can NEVER exercise the
    # customer-facing web surface (licence activation/validation, billing,
    # rate-limiter). This step installs src/web/requirements.txt into an
    # ISOLATED .venv-web (web-venv cache) so the lighter steps stay lean (AC4),
    # then runs the non-e2e web suite as a HARD gate — a plain step fails the
    # pipeline on any web-test failure (AC2).
    #
    # --ignore=src/web/tests/e2e is LOAD-BEARING: src/web/tests/conftest.py's
    # pytest_collection_modifyitems only REORDERS e2e to the end, it does not
    # skip it. The e2e subset boots a session-scoped uvicorn server and is
    # excluded pending the REVUE-332 asyncio-loop-leak fix; include it here only
    # after 332 lands.
    #
    # tests/test_activation_rate_limit.py lives in the root tests/ tree but
    # exercises the FastAPI app; it is run HERE (where fastapi is installed) so
    # its 16 tests execute for real (AC3) instead of importorskip-ing in the
    # fastapi-less root step. The slow concurrency test
    # (tests/integration/test_activation_concurrency.py) boots a real server and
    # stays local/slow-gated to avoid CI flakiness — it is intentionally NOT run
    # here (out of scope).
    - step: &run-web-tests
        name: "Run Web Tests"
        image: python:3.12-slim
        caches:
          - web-venv
        script:
          - test -x .venv-web/bin/python || python3 -m venv .venv-web
          - export PATH="$PWD/.venv-web/bin:$PATH"
          - python3 -c "import fastapi, uvicorn" 2>/dev/null || pip install --quiet -r src/web/requirements.txt
          - python3 -m pytest src/web/tests/ --ignore=src/web/tests/e2e -q
          - python3 -m pytest tests/test_activation_rate_limit.py -q

    # -----------------------------------------------------------------------
    # REVUE-331: activate round-trip E2E. This is the ONE step that exercises
    # the real licence-server -> CLI seam end to end, so it needs an env that
    # no other step has: the three editable packages (revue_core/revue-ci/
    # revue) AND the FastAPI web stack (src/web/requirements.txt) AND a
    # Playwright Chromium. It boots a live licence server, signs a JWT with a
    # test key, and verifies the CLI accepts it — catching the key-mismatch
    # regression (AC5) before it reaches a paying customer.
    #
    # AC7: runs unconditionally on every PR + main (a strict superset of "PRs
    # that touch packaging/revue, packaging/revue_core/licence, or the activate
    # route"). Gating on changesets would fail by silently SKIPPING the step —
    # the exact "silent brick" failure class this ticket exists to kill — so we
    # run it always and accept the CI cost.
    #
    # AC8: the round-trips run in-process (editable-install fallback) because
    # ACTIVATE_URL / VALIDATE_URL / the embedded public key are all hardcoded
    # with no override, so the compiled binary cannot be pointed at a local
    # test server. A dedicated .venv-e2e (e2e-venv cache) keeps this heavy combo
    # out of the lean ci-venv/web-venv.
    - step: &run-activate-e2e
        name: "Run Activate E2E"
        image: python:3.12-slim
        caches:
          - e2e-venv
        script:
          - test -x .venv-e2e/bin/python || python3 -m venv .venv-e2e
          - export PATH="$PWD/.venv-e2e/bin:$PATH"
          - python3 -c "import fastapi, uvicorn" 2>/dev/null || pip install --quiet -r src/web/requirements.txt
          # REVUE-405: .venv-e2e is keyed on the pyproject files, NOT
          # requirements-ci.txt, so install the build backend explicitly before
          # the --no-build-isolation editable install below.
          - python3 -c "import hatchling, editables" 2>/dev/null || pip install --quiet "hatchling>=1.21" editables
          - pip install --quiet --no-build-isolation -e packaging/revue_core/ -e packaging/revue-ci/ -e packaging/revue/
          - python3 -c "import pytest_playwright" 2>/dev/null || pip install --quiet pytest-playwright
          - python3 -m playwright install --with-deps chromium
          - python3 -m pytest packaging/revue/tests/e2e -q --rootdir=packaging/revue

    # -----------------------------------------------------------------------
    # AI self-review on every PR — runs the revue-ci CLI against the PR diff.
    # -----------------------------------------------------------------------
    - step: &revue-review
        name: "Revue AI Code Review"
        image: python:3.12
        caches:
          - ci-venv
        script:
          - test -x .venv/bin/python || python3 -m venv .venv
          - export PATH="$PWD/.venv/bin:$PATH"
          - python3 -c "import pytest, jsonschema, yaml" 2>/dev/null || pip install --quiet -r requirements-ci.txt
          # REVUE-405: --no-build-isolation reuses the cached venv's hatchling
          # instead of a per-run PEP 517 build-isolation fetch from PyPI.
          - pip install --quiet --no-build-isolation -e packaging/revue_core/ -e packaging/revue-ci/
          - git diff origin/${BITBUCKET_PR_DESTINATION_BRANCH}...HEAD > /tmp/revue_pr.diff
          - echo "[revue] Diff size $(wc -l < /tmp/revue_pr.diff) lines"
          - echo "[revue] Fetching PR description for context filtering..."
          - |
            curl -sf "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}/pullrequests/${BITBUCKET_PR_ID}" \
              -u "${BITBUCKET_USERNAME}:${BITBUCKET_API_TOKEN}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('description',''))" \
              > /tmp/revue_pr_description.txt \
            && echo "[revue] PR description fetched ($(wc -c < /tmp/revue_pr_description.txt) bytes)" \
            || { echo ""; echo "========================================================================"; echo "‼️  WARNING: PR DESCRIPTION COULD NOT BE FETCHED"; echo "⚠️  THE REVIEW WILL PROCEED WITHOUT AUTHOR CONTEXT."; echo "⚠️  REVIEW QUALITY MAY BE REDUCED."; echo "⚠️  CHECK: BITBUCKET_USERNAME AND BITBUCKET_API_TOKEN ARE SET CORRECTLY."; echo "========================================================================"; echo ""; }
          - echo "[revue] Validating config..."
          - revue-ci validate --config .revue.yml
          - echo "[revue] Starting AI code review..."
          - export APP_ENV=production  # Use real licence validation via revue.sh
          - export REVUE_METRICS_ENABLED=1
          - export REVUE_LOG_LEVEL=DEBUG  # Enable logging of BodyBuilder routing and platform selection
          # Provider and model are read from .revue.yml — no --provider/--model flags needed.
          # Set the API key CI variable matching your configured provider:
          #   anthropic → REVUE_ANTHROPIC_API_KEY   openai → OPENAI_API_KEY  (REVUE-148)
          - revue-ci review --diff /tmp/revue_pr.diff --platform bitbucket --pr-id "$BITBUCKET_PR_ID" --workspace "$BITBUCKET_WORKSPACE" --repo-slug "$BITBUCKET_REPO_SLUG" --bb-username "$BITBUCKET_USERNAME" --bb-token "$BITBUCKET_API_TOKEN" --config .revue.yml --comment-style per-issue --pr-description-file /tmp/revue_pr_description.txt --verbose
          - echo "[revue] Review complete"
        artifacts:
          - .revue/metrics.jsonl

    # -----------------------------------------------------------------------
    # Per-platform Nuitka builds for all three packages (revue_core, revue-ci,
    # revue skill). revue_core is project IP and must ship compiled — no
    # plain-Python wheel may ever be published. See CLAUDE.md → "IP protection".
    # -----------------------------------------------------------------------
    - step: &build-revue-core-macos
        name: "Build macOS ARM64 — revue_core"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .revue-core-build-venv
          - .revue-core-build-venv/bin/pip install nuitka ordered-set zstandard
          - .revue-core-build-venv/bin/python -u packaging/revue_core/build/build_nuitka.py
          - .revue-core-build-venv/bin/python -u packaging/revue_core/build/build_wheel.py
        artifacts:
          - packaging/revue_core/dist/wheels/*.whl

    - step: &build-revue-core-linux
        name: "Build Linux x86_64 — revue_core"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc patchelf libc6-dev
          - pip install nuitka ordered-set zstandard
          - python -u packaging/revue_core/build/build_nuitka.py
          - python -u packaging/revue_core/build/build_wheel.py
        artifacts:
          - packaging/revue_core/dist/wheels/*.whl

    # revue-ci compiles cli.py via Nuitka. The build venv still installs
    # revue_core editable from source so revue-ci's imports resolve at
    # compile time — the editable install never hits PyPI.
    - step: &build-revue-ci-macos
        name: "Build macOS ARM64 — revue-ci"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .revue-ci-build-venv
          - .revue-ci-build-venv/bin/pip install nuitka ordered-set zstandard
          - .revue-ci-build-venv/bin/pip install -e packaging/revue_core/
          - .revue-ci-build-venv/bin/python -u packaging/revue-ci/build/build_nuitka.py
          - .revue-ci-build-venv/bin/python -u packaging/revue-ci/build/build_wheel.py
        artifacts:
          - packaging/revue-ci/dist/wheels/*.whl

    - step: &build-revue-ci-linux
        name: "Build Linux x86_64 — revue-ci"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc patchelf libc6-dev
          - pip install nuitka ordered-set zstandard
          - pip install -e packaging/revue_core/
          - python -u packaging/revue-ci/build/build_nuitka.py
          - python -u packaging/revue-ci/build/build_wheel.py
        artifacts:
          - packaging/revue-ci/dist/wheels/*.whl

    - step: &build-skill-macos
        name: "Build macOS ARM64 — revue skill"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .skill-build-venv
          - .skill-build-venv/bin/pip install nuitka ordered-set zstandard pyyaml jsonschema
          - python3.12 packaging/revue/tools/vendor_sources.py --clean
          - .skill-build-venv/bin/python -u packaging/revue/build/build_nuitka.py
          - .skill-build-venv/bin/python -u packaging/revue/build/build_wheel.py
          - .skill-build-venv/bin/python -u packaging/revue/tools/verify_wheel_licence_gate.py packaging/revue/dist/wheels/*.whl
        artifacts:
          - packaging/revue/dist/wheels/*.whl

    - step: &build-skill-linux
        name: "Build Linux x86_64 — revue skill"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc git patchelf libc6-dev
          - pip install nuitka ordered-set zstandard pyyaml jsonschema
          - python packaging/revue/tools/vendor_sources.py --clean
          - python -u packaging/revue/build/build_nuitka.py
          - python -u packaging/revue/build/build_wheel.py
          - python -u packaging/revue/tools/verify_wheel_licence_gate.py packaging/revue/dist/wheels/*.whl
        artifacts:
          - packaging/revue/dist/wheels/*.whl

    # -----------------------------------------------------------------------
    # Atomic 3-package publish chain — fail-fast left to right.
    # revue_core publishes first; if it fails, revue-ci + revue stay
    # unreleased, which prevents a published revue-ci pinning a phantom
    # revue_core version.
    # -----------------------------------------------------------------------
    - step: &publish-revue-core-pypi
        name: "Publish revue_core → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue_core/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue_core/dist/wheels/*.whl
            else
              echo "No revue_core wheels found — aborting (downstream packages depend on this)" >&2
              exit 1
            fi

    - step: &publish-revue-ci-pypi
        name: "Publish revue-ci → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue-ci/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue-ci/dist/wheels/*.whl
            else
              echo "No revue-ci wheels found — aborting" >&2
              exit 1
            fi

    - step: &publish-skill-pypi
        name: "Publish revue skill → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue/dist/wheels/*.whl
            else
              echo "No skill wheels found — aborting" >&2
              exit 1
            fi

pipelines:
  branches:
    main:
      # REVUE-393: unit + web suites run in parallel (independent — separate
      # venvs/deps/code), gating the build → deploy chain.
      # REVUE-331: the activate round-trip e2e joins the gate (independent venv).
      - parallel:
          - step: *run-tests
          - step: *run-web-tests
          - step: *run-activate-e2e
      - step: *build-web-image-fly
      - step: *deploy-web-staging
      - step: *smoke-web-staging
      # REVUE-409: ensure the E2E accounts exist (idempotent) BEFORE the E2E step
      # reads their licence keys at runtime, then run the E2E suite. A red provision
      # or E2E run halts the pipeline here, so the manual *deploy-web-production
      # step never becomes available.
      - step: *provision-staging-e2e
      - step: *e2e-web-staging
      - step: *deploy-web-production
      - step: *smoke-web-production
      - step:
          name: "Tag Release (if warranted)"
          script:
            - apt-get update -qq && apt-get install -y --no-install-recommends git
            - |
              BUMP=$(python3 build/determine_release.py "$(git log -1 --format='%s' HEAD)")
              echo "Commit type → bump: $BUMP"
              if [ "$BUMP" = "none" ]; then
                echo "No release for this commit type — skipping tag"
                exit 0
              fi
              if [ -z "${BITBUCKET_API_TOKEN:-}" ]; then
                echo "Error: BITBUCKET_API_TOKEN not set — cannot push tag" >&2
                exit 1
              fi
              case "$BUMP" in
                major|minor|patch) ;;
                *) echo "Error: unexpected bump value: $BUMP" >&2; exit 1 ;;
              esac
              # Derive version from latest git tag, not pyproject.toml — so we never
              # need to push a commit to main (which would break subsequent pipeline steps
              # by moving the branch tip past the trigger commit in a depth-1 clone).
              LATEST_TAG=$(git ls-remote --tags origin 'refs/tags/v*' \
                | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' \
                | sort -V | tail -1)
              CURRENT_VERSION="${LATEST_TAG#v}"
              CURRENT_VERSION="${CURRENT_VERSION:-0.0.0}"
              echo "Latest tag: ${LATEST_TAG:-none}, bumping from ${CURRENT_VERSION}"
              NEXT_VERSION=$(python3 -c '
              import sys
              major, minor, patch_n = map(int, sys.argv[1].split("."))
              b = sys.argv[2]
              if b == "major": major += 1; minor = 0; patch_n = 0
              elif b == "minor": minor += 1; patch_n = 0
              elif b == "patch": patch_n += 1
              print(f"{major}.{minor}.{patch_n}")
              ' "$CURRENT_VERSION" "$BUMP")
              echo "Next version: v${NEXT_VERSION}"
              if git ls-remote --tags origin "refs/tags/v${NEXT_VERSION}" | grep -q "v${NEXT_VERSION}"; then
                echo "Tag v${NEXT_VERSION} already exists — skipping duplicate release"
                exit 0
              fi
              git config user.name "Revue CI"
              git config user.email "ci@revue.sh"
              # BITBUCKET_API_TOKEN is a workspace/repo access token — x-token-auth is required as the git credential username.
              git remote set-url origin "https://x-token-auth:${BITBUCKET_API_TOKEN}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}"
              # Bump version in all three pyproject.tomls AND update the cross-package
              # revue_core pins in revue-ci and revue — they are released atomically
              # against a single tag, so the downstream pins track NEXT_VERSION.
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue_core/pyproject.toml
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue-ci/pyproject.toml
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue/pyproject.toml
              sed -i "s/\"revue_core~=[^\"]*\"/\"revue_core~=${NEXT_VERSION}\"/" packaging/revue-ci/pyproject.toml
              sed -i "s/\"revue_core~=[^\"]*\"/\"revue_core~=${NEXT_VERSION}\"/" packaging/revue/pyproject.toml
              # REVUE-372: the skill wheel's runtime __version__ lives in __init__.py,
              # not pyproject.toml. build_nuitka.py copies this file verbatim into the
              # compiled wheel, and the customer-side `install-skill` strict check
              # compares it against the manifest version. Bump it here too or every
              # release after 0.1.0 fails to install.
              sed -i "s/^__version__ = \"[^\"]*\"/__version__ = \"${NEXT_VERSION}\"/" packaging/revue/src/revue_skill/__init__.py
              git add packaging/revue_core/pyproject.toml packaging/revue-ci/pyproject.toml packaging/revue/pyproject.toml packaging/revue/src/revue_skill/__init__.py
              git commit -m "chore(release): v${NEXT_VERSION}"
              git tag "v${NEXT_VERSION}"
              git push origin "v${NEXT_VERSION}"
              echo "Released v${NEXT_VERSION}"

    develop:
      - parallel:
          - step: *run-tests
          - step: *run-web-tests

  tags:
    'v*':
      # REVUE-393: unit + web suites in parallel, gating the wheel build + PyPI publish.
      - parallel:
          - step: *run-tests
          - step: *run-web-tests
      # --- Build all wheels in parallel ---
      # Each Nuitka build is independent at compile time (each step runs its own
      # `pip install -e packaging/revue_core/` from source). macOS×3 will queue
      # on the single self-hosted runner; Linux×3 truly parallelize on cloud
      # Docker workers. Listed macOS-first for readability — order inside a
      # parallel block has no effect on scheduling.
      - parallel:
          - step: *build-revue-core-macos
          - step: *build-revue-ci-macos
          - step: *build-skill-macos
          - step: *build-revue-core-linux
          - step: *build-revue-ci-linux
          - step: *build-skill-linux
      # --- Atomic publish chain — fail-fast left to right ---
      # revue_core must publish before revue-ci / revue, since both pin it.
      # If revue_core publish fails, dependents are skipped via step ordering
      # (Bitbucket Pipelines stops on first failed step in the same pipeline).
      - step: *publish-revue-core-pypi
      - step: *publish-revue-ci-pypi
      - step: *publish-skill-pypi

  pull-requests:
    "**":
      # REVUE-393: unit + web suites in parallel (independent). The AI review runs
      # ONLY if both pass — fail-fast on the cheap test gates before spending AI
      # tokens reviewing a PR that's already red.
      # REVUE-331 AC7: the activate round-trip e2e runs on every PR, gating the
      # AI review alongside the unit + web suites.
      - parallel:
          - step: *run-tests
          - step: *run-web-tests
          - step: *run-activate-e2e
      - step: *revue-review

  custom:
    # -----------------------------------------------------------------------
    # REVUE-419: API-triggerable production WEB deploy.
    #
    # Bitbucket Cloud has NO REST API to play/continue an individual `trigger:
    # manual` step inside a running pipeline, but it CAN trigger a whole custom
    # pipeline via a selector. This pipeline gives an API-initiated prod-deploy
    # path WITHOUT weakening the manual gate on the normal merge flow — that
    # step (branches.main → *deploy-web-production) stays `trigger: manual`.
    #
    # The deploy step here reuses *prod-deploy-script (the SAME logic as the
    # manual main step) and the smoke step reuses *smoke-web-production, so the
    # custom path can never diverge from the gated path. The deploy step has NO
    # `trigger: manual` — the API call that starts this pipeline IS the human
    # authorization.
    #
    # ANTI-DOWNGRADE GUARD (load-bearing, ENFORCED — not a convention):
    # The Bitbucket API can trigger this custom pipeline with a
    # `pipeline_commit_target` pointing at an ARBITRARY old main commit, not just
    # ref_name=main. ${BITBUCKET_COMMIT} then resolves to that old SHA; if a
    # stale registry.fly.io/revue-staging:<old-SHA> image still exists, prod
    # would be silently DOWNGRADED to an old/vulnerable image, bypassing the
    # manual gate. The first step below ("Guard → refuse non-main-HEAD trigger")
    # fetches origin/main and HARD-FAILS unless ${BITBUCKET_COMMIT} equals the
    # current origin/main HEAD. It is a SEPARATE step — deliberately NOT folded
    # into *prod-deploy-script — because that anchor is reused by the manual
    # main-branch deploy step, where main may legitimately have advanced past
    # the trigger commit; folding the guard in would wrongly refuse a valid
    # manual deploy. The guard compares HEAD COMMITS (not BITBUCKET_BRANCH ==
    # main), which is strictly stronger and works even when BITBUCKET_BRANCH is
    # unset for commit-target triggers.
    #
    # Once the guard passes, ${BITBUCKET_COMMIT} == main's HEAD == the merge
    # commit, which is exactly the commit the merge pipeline already built+pushed
    # as registry.fly.io/revue-staging:${BITBUCKET_COMMIT}, so this deploys the
    # already-staged image. (If that image was never pushed, `flyctl deploy`
    # fails loudly with image-not-found.)
    #
    # STAGING-GREEN PRECONDITION (operator responsibility): this custom path does
    # NOT re-run deploy-web-staging / smoke-web-staging — by design, to stay fast.
    # Before triggering, the operator MUST confirm the latest main pipeline's
    # `smoke-web-staging` for THIS exact SHA was SUCCESSFUL. The prod
    # `*smoke-web-production` step below is the post-deploy net, not a substitute
    # for that pre-trigger staging check. (A future hard-gate option — prepending
    # deploy-web-staging + smoke-web-staging to this pipeline — is being decided
    # separately and is intentionally NOT added here.)
    #
    # WEB-DEPLOY ONLY: this pipeline must never reference any tag/Nuitka/PyPI
    # publish step — the publish-path human gate is non-negotiable and untouched.
    #
    # Trigger:
    #   POST https://api.bitbucket.org/2.0/repositories/cbscd/revue/pipelines/
    #   {"target":{"type":"pipeline_ref_target","ref_type":"branch",
    #    "ref_name":"main","selector":{"type":"custom","pattern":"deploy-production"}}}
    # -----------------------------------------------------------------------
    deploy-production:
      # Anti-downgrade / off-branch guard — see the block comment above. Refuses
      # any trigger whose commit is not the current origin/main HEAD, so a
      # commit-target trigger on a stale SHA cannot silently downgrade prod.
      - step:
          name: "Guard → refuse non-main-HEAD trigger"
          script:
            # python:3.12-slim ships no git — install it so the guard can run.
            # If this fetch/rev-parse can't run, the step fails closed (refuses
            # the deploy), which is the safe direction.
            - apt-get update -qq && apt-get install -y --no-install-recommends git
            - |
              set -eu
              # Resolve main HEAD into its own command (not inside the comparison
              # substitution) so a fetch/rev-parse failure aborts loudly under
              # `set -e` and surfaces the real git error, instead of yielding an
              # empty string that masquerades as a downgrade-guard refusal.
              git fetch --depth=1 origin main
              MAIN_HEAD="$(git rev-parse FETCH_HEAD)"
              if [ "$MAIN_HEAD" != "$BITBUCKET_COMMIT" ]; then
                echo "REFUSING prod deploy: $BITBUCKET_COMMIT is not current origin/main HEAD $MAIN_HEAD (off-branch or downgrade trigger)" >&2
                exit 1
              fi
      - step:
          name: "Deploy Web → Production (API-triggered)"
          script: *prod-deploy-script
      - step: *smoke-web-production

    debug-revue-skill-macos-build:
      - step:
          name: "Debug — Build macOS ARM64 (revue skill)"
          runs-on:
            - self.hosted
            - macos
          script:
            - export PATH="/opt/homebrew/bin:$PATH"
            - python3.12 --version
            - python3.12 -m venv .skill-build-venv
            - .skill-build-venv/bin/pip install nuitka ordered-set zstandard pyyaml jsonschema
            - python3.12 packaging/revue/tools/vendor_sources.py --clean
            - .skill-build-venv/bin/python -u packaging/revue/build/build_nuitka.py
            - .skill-build-venv/bin/python -u packaging/revue/build/build_wheel.py
          artifacts:
            - packaging/revue/dist/wheels/*.whl
