image: python:3.12-slim

definitions:
  steps:
    - step: &run-tests
        name: "Run Tests"
        caches:
          - pip
        script:
          - pip install openai anthropic httpx pyyaml tomli-w pytest --quiet
          - cd src && PYTHONPATH=$(pwd) python3 -m pytest revue/tests/ -q --log-cli-level=DEBUG

    - step: &revue-review
        name: "Revue.io AI Code Review"
        image: python:3.12
        caches:
          - pip
        script:
          - pip install openai anthropic httpx pyyaml tomli-w --quiet
          - git diff origin/${BITBUCKET_PR_DESTINATION_BRANCH}...HEAD > /tmp/revue_pr.diff
          - echo "[revue] Diff size $(wc -l < /tmp/revue_pr.diff) lines"
          - echo "[revue] Fetching PR description for context filtering..."
          - |
            curl -sf "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}/pullrequests/${BITBUCKET_PR_ID}" \
              -u "${BITBUCKET_USERNAME}:${BITBUCKET_API_TOKEN}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('description',''))" \
              > /tmp/revue_pr_description.txt \
            && echo "[revue] PR description fetched ($(wc -c < /tmp/revue_pr_description.txt) bytes)" \
            || echo "[revue] PR description fetch failed — continuing without context"
          - echo "[revue] Validating config..."
          - PYTHONPATH="$(pwd)/src" python3 -m revue.cli validate --config .revue.yml
          - echo "[revue] Starting AI code review..."
          - export PYTHONPATH="$(pwd)/src"
          - export APP_ENV=staging  # Enable REVUE_TIER_OVERRIDE for CI
          - python3 -u src/revue/cli.py review --diff /tmp/revue_pr.diff --platform bitbucket --pr-id "$BITBUCKET_PR_ID" --workspace "$BITBUCKET_WORKSPACE" --repo-slug "$BITBUCKET_REPO_SLUG" --bb-username "$BITBUCKET_USERNAME" --bb-token "$BITBUCKET_API_TOKEN" --provider "${AI_PROVIDER:-anthropic}" --model "${AI_MODEL:-claude-sonnet-4-5-20250929}" --config .revue.yml --comment-style per-issue --pr-description-file /tmp/revue_pr_description.txt
          - echo "[revue] Review complete"

pipelines:
  branches:
    main:
      - step: *run-tests
      - parallel:
          steps:
            - step:
                name: "Build Linux x86_64"
                image: python:3.12-slim
                caches:
                  - pip
                script:
                  - apt-get update && apt-get install -y --no-install-recommends gcc patchelf
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
            - step:
                name: "Build Linux ARM64"
                image: python:3.12-slim
                runs-on:
                  - self.hosted
                  - linux.arm64
                caches:
                  - pip
                script:
                  - apt-get update && apt-get install -y --no-install-recommends gcc patchelf
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
                fail-fast: false
            - step:
                name: "Build macOS ARM64"
                runs-on:
                  - self.hosted
                  - macos.arm64
                caches:
                  - pip
                script:
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
                fail-fast: false
      - step:
          name: "Collect Artifacts"
          script:
            - ls -la dist/wheels/ 2>/dev/null || echo "No wheels built (self-hosted runners may be offline)"
          artifacts:
            - dist/wheels/*.whl
    develop:
      - step: *run-tests

  pull-requests:
    "**":
      - step: *run-tests
      - step: *revue-review
