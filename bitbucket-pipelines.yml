image: python:3.12-slim

clone:
  depth: 1

definitions:
  caches:
    ci-venv:
      key:
        files:
          - requirements-ci.txt
          - packaging/revue_core/pyproject.toml
          - packaging/revue-ci/pyproject.toml
          - packaging/revue/pyproject.toml
      path: .venv

  steps:
    # -----------------------------------------------------------------------
    # Main-branch web promotion chain (REVUE-348): build one immutable image,
    # deploy it to staging, smoke-test, then manually promote that same image
    # to production and smoke-test again.
    # -----------------------------------------------------------------------
    # REVUE-352: DOCKER_BUILDKIT=0 is LOAD-BEARING. The docker:24.0.7-cli image
    # enables BuildKit by default, which tries to launch a privileged
    # buildx_buildkit_default container. Bitbucket Pipelines forbids
    # --privileged=true and rejects the build with "authorization denied by
    # plugin pipelines". Disabling BuildKit forces the legacy build path,
    # which does NOT require privileged mode. Do not remove this export or
    # "modernise" by re-enabling buildx without first confirming a
    # non-privileged build path works inside Bitbucket Pipelines.
    - step: &build-web-image-fly
        name: "Build Web Image → Fly Registry"
        image: docker:24.0.7-cli
        services:
          - docker
        script:
          - apk add --no-cache curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - export DOCKER_BUILDKIT=0
          - flyctl auth docker
          - docker build -t "$WEB_IMAGE" src/web
          - docker push "$WEB_IMAGE"

    - step: &deploy-web-staging
        name: "Deploy Web → Staging"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - cd src/web && flyctl deploy --app revue-staging --config fly.staging.toml --image "$WEB_IMAGE" --remote-only

    - step: &smoke-web-staging
        name: "Smoke Test → Staging"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - |
            set -eu
            CURL_RETRY_FLAGS="--retry 12 --retry-all-errors --connect-timeout 5 --max-time 20"

            assert_json_health() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
              if ! python3 -c 'import json, sys; raise SystemExit(json.load(open(sys.argv[1], encoding="utf-8")) != {"status": "ok"})' "$out"
              then
                echo "Unexpected health body from $1" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_200() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_422() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" -X POST "$1" -H 'content-type: application/json' -d '{}')"
              if [ "$code" != "422" ]; then
                echo "Expected 422 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_json_health "https://staging.revue.sh/health"
            assert_200 "https://api.staging.revue.sh/health"
            assert_422 "https://api.staging.revue.sh/license/validate"
            assert_422 "https://staging.revue.sh/api/license/validate"

    - step: &deploy-web-production
        name: "Deploy Web → Production"
        trigger: manual
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - curl -fsSL https://fly.io/install.sh -o /tmp/fly-install.sh && sh /tmp/fly-install.sh
          - export PATH="$HOME/.fly/bin:$PATH"
          - test -n "${FLY_API_TOKEN:-}"
          - export WEB_IMAGE="registry.fly.io/revue-staging:${BITBUCKET_COMMIT}"
          - cd src/web && flyctl deploy --app revue-io --config fly.toml --image "$WEB_IMAGE" --remote-only

    - step: &smoke-web-production
        name: "Smoke Test → Production"
        script:
          - apt-get update -qq && apt-get install -y --no-install-recommends curl
          - |
            set -eu
            CURL_RETRY_FLAGS="--retry 12 --retry-all-errors --connect-timeout 5 --max-time 20"

            assert_json_health() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
              if ! python3 -c 'import json, sys; raise SystemExit(json.load(open(sys.argv[1], encoding="utf-8")) != {"status": "ok"})' "$out"
              then
                echo "Unexpected health body from $1" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_200() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" "$1")"
              if [ "$code" != "200" ]; then
                echo "Expected 200 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_422() {
              out="$(mktemp)"
              code="$(curl -sS $CURL_RETRY_FLAGS -o "$out" -w "%{http_code}" -X POST "$1" -H 'content-type: application/json' -d '{}')"
              if [ "$code" != "422" ]; then
                echo "Expected 422 from $1, got $code" >&2
                cat "$out" >&2
                exit 1
              fi
            }

            assert_json_health "https://revue.sh/health"
            assert_200 "https://api.revue.sh/health"
            assert_422 "https://api.revue.sh/license/validate"
            assert_422 "https://revue.sh/api/license/validate"

    # -----------------------------------------------------------------------
    # Tests — install all three packages and exercise each test suite.
    # revue_core is the leaf; revue-ci + revue depend on it. Order matters:
    # editable installs of dependents must come after revue_core so import
    # resolution targets the local copy.
    # -----------------------------------------------------------------------
    - step: &run-tests
        name: "Run Tests"
        caches:
          - ci-venv
        script:
          # The base image is python:3.12-slim, which ships no git. One test
          # (test_local_run_wheel_paths.py::…repo_root_resolves_to_customer_repo,
          # added in REVUE-369) shells out to real `git init/add/commit` to build
          # a fake customer repo and assert the vendored local_run resolves
          # REPO_ROOT via `git rev-parse`. Install git so that customer-path
          # coverage actually runs instead of erroring with FileNotFoundError.
          - apt-get update && apt-get install -y --no-install-recommends git
          - test -x .venv/bin/python || python3 -m venv .venv
          - export PATH="$PWD/.venv/bin:$PATH"
          - python3 -c "import pytest, jsonschema, yaml" 2>/dev/null || pip install --quiet -r requirements-ci.txt
          - pip install --quiet -e packaging/revue_core/ -e packaging/revue-ci/ -e packaging/revue/
          - python3 -m pytest packaging/revue_core/tests/ -q --rootdir=packaging/revue_core
          - python3 -m pytest packaging/revue-ci/tests/ -q --rootdir=packaging/revue-ci
          - python3 -m pytest packaging/revue/tests/ -q --rootdir=packaging/revue
          # Fresh-venv smoke test (REVUE-310) — gated behind @pytest.mark.slow
          # so it doesn't run during local `pytest`, but CI runs it explicitly
          # so package-graph regressions surface before tag time.
          - python3 -m pytest tests/integration/ -m slow -q

    # -----------------------------------------------------------------------
    # AI self-review on every PR — runs the revue-ci CLI against the PR diff.
    # -----------------------------------------------------------------------
    - step: &revue-review
        name: "Revue AI Code Review"
        image: python:3.12
        caches:
          - ci-venv
        script:
          - test -x .venv/bin/python || python3 -m venv .venv
          - export PATH="$PWD/.venv/bin:$PATH"
          - python3 -c "import pytest, jsonschema, yaml" 2>/dev/null || pip install --quiet -r requirements-ci.txt
          - pip install --quiet -e packaging/revue_core/ -e packaging/revue-ci/
          - git diff origin/${BITBUCKET_PR_DESTINATION_BRANCH}...HEAD > /tmp/revue_pr.diff
          - echo "[revue] Diff size $(wc -l < /tmp/revue_pr.diff) lines"
          - echo "[revue] Fetching PR description for context filtering..."
          - |
            curl -sf "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}/pullrequests/${BITBUCKET_PR_ID}" \
              -u "${BITBUCKET_USERNAME}:${BITBUCKET_API_TOKEN}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('description',''))" \
              > /tmp/revue_pr_description.txt \
            && echo "[revue] PR description fetched ($(wc -c < /tmp/revue_pr_description.txt) bytes)" \
            || { echo ""; echo "========================================================================"; echo "‼️  WARNING: PR DESCRIPTION COULD NOT BE FETCHED"; echo "⚠️  THE REVIEW WILL PROCEED WITHOUT AUTHOR CONTEXT."; echo "⚠️  REVIEW QUALITY MAY BE REDUCED."; echo "⚠️  CHECK: BITBUCKET_USERNAME AND BITBUCKET_API_TOKEN ARE SET CORRECTLY."; echo "========================================================================"; echo ""; }
          - echo "[revue] Validating config..."
          - revue-ci validate --config .revue.yml
          - echo "[revue] Starting AI code review..."
          - export APP_ENV=production  # Use real licence validation via revue.sh
          - export REVUE_METRICS_ENABLED=1
          - export REVUE_LOG_LEVEL=DEBUG  # Enable logging of BodyBuilder routing and platform selection
          # Provider and model are read from .revue.yml — no --provider/--model flags needed.
          # Set the API key CI variable matching your configured provider:
          #   anthropic → REVUE_ANTHROPIC_API_KEY   openai → OPENAI_API_KEY  (REVUE-148)
          - revue-ci review --diff /tmp/revue_pr.diff --platform bitbucket --pr-id "$BITBUCKET_PR_ID" --workspace "$BITBUCKET_WORKSPACE" --repo-slug "$BITBUCKET_REPO_SLUG" --bb-username "$BITBUCKET_USERNAME" --bb-token "$BITBUCKET_API_TOKEN" --config .revue.yml --comment-style per-issue --pr-description-file /tmp/revue_pr_description.txt --verbose
          - echo "[revue] Review complete"
        artifacts:
          - .revue/metrics.jsonl

    # -----------------------------------------------------------------------
    # Per-platform Nuitka builds for all three packages (revue_core, revue-ci,
    # revue skill). revue_core is project IP and must ship compiled — no
    # plain-Python wheel may ever be published. See CLAUDE.md → "IP protection".
    # -----------------------------------------------------------------------
    - step: &build-revue-core-macos
        name: "Build macOS ARM64 — revue_core"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .revue-core-build-venv
          - .revue-core-build-venv/bin/pip install nuitka ordered-set zstandard
          - .revue-core-build-venv/bin/python -u packaging/revue_core/build/build_nuitka.py
          - .revue-core-build-venv/bin/python -u packaging/revue_core/build/build_wheel.py
        artifacts:
          - packaging/revue_core/dist/wheels/*.whl

    - step: &build-revue-core-linux
        name: "Build Linux x86_64 — revue_core"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc patchelf libc6-dev
          - pip install nuitka ordered-set zstandard
          - python -u packaging/revue_core/build/build_nuitka.py
          - python -u packaging/revue_core/build/build_wheel.py
        artifacts:
          - packaging/revue_core/dist/wheels/*.whl

    # revue-ci compiles cli.py via Nuitka. The build venv still installs
    # revue_core editable from source so revue-ci's imports resolve at
    # compile time — the editable install never hits PyPI.
    - step: &build-revue-ci-macos
        name: "Build macOS ARM64 — revue-ci"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .revue-ci-build-venv
          - .revue-ci-build-venv/bin/pip install nuitka ordered-set zstandard
          - .revue-ci-build-venv/bin/pip install -e packaging/revue_core/
          - .revue-ci-build-venv/bin/python -u packaging/revue-ci/build/build_nuitka.py
          - .revue-ci-build-venv/bin/python -u packaging/revue-ci/build/build_wheel.py
        artifacts:
          - packaging/revue-ci/dist/wheels/*.whl

    - step: &build-revue-ci-linux
        name: "Build Linux x86_64 — revue-ci"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc patchelf libc6-dev
          - pip install nuitka ordered-set zstandard
          - pip install -e packaging/revue_core/
          - python -u packaging/revue-ci/build/build_nuitka.py
          - python -u packaging/revue-ci/build/build_wheel.py
        artifacts:
          - packaging/revue-ci/dist/wheels/*.whl

    - step: &build-skill-macos
        name: "Build macOS ARM64 — revue skill"
        runs-on:
          - self.hosted
          - macos
        script:
          - export PATH="/opt/homebrew/bin:$PATH"
          - python3.12 -m venv .skill-build-venv
          - .skill-build-venv/bin/pip install nuitka ordered-set zstandard pyyaml jsonschema
          - python3.12 packaging/revue/tools/vendor_sources.py --clean
          - .skill-build-venv/bin/python -u packaging/revue/build/build_nuitka.py
          - .skill-build-venv/bin/python -u packaging/revue/build/build_wheel.py
          - .skill-build-venv/bin/python -u packaging/revue/tools/verify_wheel_licence_gate.py packaging/revue/dist/wheels/*.whl
        artifacts:
          - packaging/revue/dist/wheels/*.whl

    - step: &build-skill-linux
        name: "Build Linux x86_64 — revue skill"
        image: python:3.12-slim
        caches:
          - pip
        script:
          - apt-get update && apt-get install -y --no-install-recommends gcc git patchelf libc6-dev
          - pip install nuitka ordered-set zstandard pyyaml jsonschema
          - python packaging/revue/tools/vendor_sources.py --clean
          - python -u packaging/revue/build/build_nuitka.py
          - python -u packaging/revue/build/build_wheel.py
          - python -u packaging/revue/tools/verify_wheel_licence_gate.py packaging/revue/dist/wheels/*.whl
        artifacts:
          - packaging/revue/dist/wheels/*.whl

    # -----------------------------------------------------------------------
    # Atomic 3-package publish chain — fail-fast left to right.
    # revue_core publishes first; if it fails, revue-ci + revue stay
    # unreleased, which prevents a published revue-ci pinning a phantom
    # revue_core version.
    # -----------------------------------------------------------------------
    - step: &publish-revue-core-pypi
        name: "Publish revue_core → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue_core/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue_core/dist/wheels/*.whl
            else
              echo "No revue_core wheels found — aborting (downstream packages depend on this)" >&2
              exit 1
            fi

    - step: &publish-revue-ci-pypi
        name: "Publish revue-ci → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue-ci/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue-ci/dist/wheels/*.whl
            else
              echo "No revue-ci wheels found — aborting" >&2
              exit 1
            fi

    - step: &publish-skill-pypi
        name: "Publish revue skill → PyPI"
        script:
          - pip install --quiet twine
          - |
            if ls packaging/revue/dist/wheels/*.whl 2>/dev/null; then
              export TWINE_USERNAME=__token__
              export TWINE_PASSWORD=$PYPI_API_TOKEN
              python -m twine upload --non-interactive --skip-existing packaging/revue/dist/wheels/*.whl
            else
              echo "No skill wheels found — aborting" >&2
              exit 1
            fi

pipelines:
  branches:
    main:
      - step: *run-tests
      - step: *build-web-image-fly
      - step: *deploy-web-staging
      - step: *smoke-web-staging
      - step: *deploy-web-production
      - step: *smoke-web-production
      - step:
          name: "Tag Release (if warranted)"
          script:
            - apt-get update -qq && apt-get install -y --no-install-recommends git
            - |
              BUMP=$(python3 build/determine_release.py "$(git log -1 --format='%s' HEAD)")
              echo "Commit type → bump: $BUMP"
              if [ "$BUMP" = "none" ]; then
                echo "No release for this commit type — skipping tag"
                exit 0
              fi
              if [ -z "${BITBUCKET_API_TOKEN:-}" ]; then
                echo "Error: BITBUCKET_API_TOKEN not set — cannot push tag" >&2
                exit 1
              fi
              case "$BUMP" in
                major|minor|patch) ;;
                *) echo "Error: unexpected bump value: $BUMP" >&2; exit 1 ;;
              esac
              # Derive version from latest git tag, not pyproject.toml — so we never
              # need to push a commit to main (which would break subsequent pipeline steps
              # by moving the branch tip past the trigger commit in a depth-1 clone).
              LATEST_TAG=$(git ls-remote --tags origin 'refs/tags/v*' \
                | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' \
                | sort -V | tail -1)
              CURRENT_VERSION="${LATEST_TAG#v}"
              CURRENT_VERSION="${CURRENT_VERSION:-0.0.0}"
              echo "Latest tag: ${LATEST_TAG:-none}, bumping from ${CURRENT_VERSION}"
              NEXT_VERSION=$(python3 -c '
              import sys
              major, minor, patch_n = map(int, sys.argv[1].split("."))
              b = sys.argv[2]
              if b == "major": major += 1; minor = 0; patch_n = 0
              elif b == "minor": minor += 1; patch_n = 0
              elif b == "patch": patch_n += 1
              print(f"{major}.{minor}.{patch_n}")
              ' "$CURRENT_VERSION" "$BUMP")
              echo "Next version: v${NEXT_VERSION}"
              if git ls-remote --tags origin "refs/tags/v${NEXT_VERSION}" | grep -q "v${NEXT_VERSION}"; then
                echo "Tag v${NEXT_VERSION} already exists — skipping duplicate release"
                exit 0
              fi
              git config user.name "Revue CI"
              git config user.email "ci@revue.sh"
              # BITBUCKET_API_TOKEN is a workspace/repo access token — x-token-auth is required as the git credential username.
              git remote set-url origin "https://x-token-auth:${BITBUCKET_API_TOKEN}@bitbucket.org/${BITBUCKET_REPO_FULL_NAME}"
              # Bump version in all three pyproject.tomls AND update the cross-package
              # revue_core pins in revue-ci and revue — they are released atomically
              # against a single tag, so the downstream pins track NEXT_VERSION.
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue_core/pyproject.toml
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue-ci/pyproject.toml
              sed -i "s/^version = \"[^\"]*\"/version = \"${NEXT_VERSION}\"/" packaging/revue/pyproject.toml
              sed -i "s/\"revue_core~=[^\"]*\"/\"revue_core~=${NEXT_VERSION}\"/" packaging/revue-ci/pyproject.toml
              sed -i "s/\"revue_core~=[^\"]*\"/\"revue_core~=${NEXT_VERSION}\"/" packaging/revue/pyproject.toml
              # REVUE-372: the skill wheel's runtime __version__ lives in __init__.py,
              # not pyproject.toml. build_nuitka.py copies this file verbatim into the
              # compiled wheel, and the customer-side `install-skill` strict check
              # compares it against the manifest version. Bump it here too or every
              # release after 0.1.0 fails to install.
              sed -i "s/^__version__ = \"[^\"]*\"/__version__ = \"${NEXT_VERSION}\"/" packaging/revue/src/revue_skill/__init__.py
              git add packaging/revue_core/pyproject.toml packaging/revue-ci/pyproject.toml packaging/revue/pyproject.toml packaging/revue/src/revue_skill/__init__.py
              git commit -m "chore(release): v${NEXT_VERSION}"
              git tag "v${NEXT_VERSION}"
              git push origin "v${NEXT_VERSION}"
              echo "Released v${NEXT_VERSION}"

    develop:
      - step: *run-tests

  tags:
    'v*':
      - step: *run-tests
      # --- Build all wheels in parallel ---
      # Each Nuitka build is independent at compile time (each step runs its own
      # `pip install -e packaging/revue_core/` from source). macOS×3 will queue
      # on the single self-hosted runner; Linux×3 truly parallelize on cloud
      # Docker workers. Listed macOS-first for readability — order inside a
      # parallel block has no effect on scheduling.
      - parallel:
          - step: *build-revue-core-macos
          - step: *build-revue-ci-macos
          - step: *build-skill-macos
          - step: *build-revue-core-linux
          - step: *build-revue-ci-linux
          - step: *build-skill-linux
      # --- Atomic publish chain — fail-fast left to right ---
      # revue_core must publish before revue-ci / revue, since both pin it.
      # If revue_core publish fails, dependents are skipped via step ordering
      # (Bitbucket Pipelines stops on first failed step in the same pipeline).
      - step: *publish-revue-core-pypi
      - step: *publish-revue-ci-pypi
      - step: *publish-skill-pypi

  pull-requests:
    "**":
      - step: *run-tests
      - step: *revue-review

  custom:
    debug-revue-skill-macos-build:
      - step:
          name: "Debug — Build macOS ARM64 (revue skill)"
          runs-on:
            - self.hosted
            - macos
          script:
            - export PATH="/opt/homebrew/bin:$PATH"
            - python3.12 --version
            - python3.12 -m venv .skill-build-venv
            - .skill-build-venv/bin/pip install nuitka ordered-set zstandard pyyaml jsonschema
            - python3.12 packaging/revue/tools/vendor_sources.py --clean
            - .skill-build-venv/bin/python -u packaging/revue/build/build_nuitka.py
            - .skill-build-venv/bin/python -u packaging/revue/build/build_wheel.py
          artifacts:
            - packaging/revue/dist/wheels/*.whl
