image: python:3.12-slim

definitions:
  steps:
    - step: &run-tests
        name: "Run Tests"
        caches:
          - pip
        script:
          - pip install --upgrade setuptools pip --quiet
          - pip install -e src/ --quiet
          - pip install pytest --quiet
          - cd src/revue && python3 -m pytest tests/ -q

    - step: &revue-review
        name: "Revue.io AI Code Review"
        caches:
          - pip
        script:
          - pip install --upgrade setuptools pip --quiet
          - pip install -e src/ --quiet
          - |
            AUTH=$(echo -n "${BITBUCKET_USERNAME}:${BITBUCKET_API_TOKEN}" | base64)
            curl -s \
              -H "Authorization: Basic ${AUTH}" \
              -H "Accept: text/plain" \
              "https://api.bitbucket.org/2.0/repositories/${BITBUCKET_WORKSPACE}/${BITBUCKET_REPO_SLUG}/pullrequests/${BITBUCKET_PR_ID}/diff" \
              -o /tmp/revue_pr.diff
          - |
            AI_API_KEY="${AI_API_KEY}" revue review \
              --diff /tmp/revue_pr.diff \
              --platform bitbucket \
              --pr-id "${BITBUCKET_PR_ID}" \
              --workspace "${BITBUCKET_WORKSPACE}" \
              --repo-slug "${BITBUCKET_REPO_SLUG}" \
              --bb-username "${BITBUCKET_USERNAME}" \
              --bb-token "${BITBUCKET_API_TOKEN}" \
              --provider "${AI_PROVIDER:-anthropic}" \
              --model "${AI_MODEL:-claude-sonnet-4-5-20250929}" \
              --mode multi-agent \
              --config .revue.yml \
              || echo "Review completed with warnings"

pipelines:
  branches:
    main:
      - step: *run-tests
      - parallel:
          steps:
            - step:
                name: "Build Linux x86_64"
                image: python:3.12-slim
                caches:
                  - pip
                script:
                  - apt-get update && apt-get install -y --no-install-recommends gcc patchelf
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
            - step:
                name: "Build Linux ARM64"
                image: python:3.12-slim
                runs-on:
                  - self.hosted
                  - linux.arm64
                caches:
                  - pip
                script:
                  - apt-get update && apt-get install -y --no-install-recommends gcc patchelf
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
            - step:
                name: "Build macOS ARM64"
                runs-on:
                  - self.hosted
                  - macos.arm64
                caches:
                  - pip
                script:
                  - pip install nuitka ordered-set zstandard
                  - pip install -e src/
                  - python build/build_nuitka.py
                  - python build/build_wheel.py
                artifacts:
                  - dist/wheels/*.whl
      - step:
          name: "Collect Artifacts"
          script:
            - ls -la dist/wheels/ || echo "No wheels built yet"
          artifacts:
            - dist/wheels/*.whl
    develop:
      - step: *run-tests

  pull-requests:
    "**":
      - step: *run-tests
      - step: *revue-review
