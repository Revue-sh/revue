name: Revue Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  revue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Broken gitlink at context/ai-code-review-service (no .gitmodules)
          # would otherwise cause "git failed with exit code 128" warnings in
          # the post-checkout cleanup. Skip submodules until that is resolved.
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install openai anthropic httpx pyyaml tomli-w --quiet

      - name: Generate diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/revue_pr.diff
          echo "[revue] Diff size $(wc -l < /tmp/revue_pr.diff) lines"

      - name: Fetch PR description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sf \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('body',''))" \
            > /tmp/revue_pr_description.txt \
          && { echo ""; echo "========================================================================"; echo "✅  PR description fetched ($(wc -c < /tmp/revue_pr_description.txt) bytes)"; echo "========================================================================"; echo ""; } \
          || { echo ""; echo "========================================================================"; echo "‼️  WARNING: PR DESCRIPTION COULD NOT BE FETCHED"; echo "⚠️  THE REVIEW WILL PROCEED WITHOUT AUTHOR CONTEXT."; echo "⚠️  REVIEW QUALITY MAY BE REDUCED."; echo "⚠️  CHECK: GITHUB_TOKEN IS SET CORRECTLY."; echo "========================================================================"; echo ""; }

      - name: Validate config
        run: PYTHONPATH="$(pwd)/src" python3 -m revue.cli validate --config .revue.yml

      - name: AI Code Review
        env:
          # Provider and model are read from .revue.yml — no CLI flags needed.
          # Set the API key matching your configured provider:
          #   anthropic → REVUE_ANTHROPIC_API_KEY
          #   openai    → OPENAI_API_KEY  (see REVUE-148 for per-provider key docs)
          REVUE_ANTHROPIC_API_KEY: ${{ secrets.REVUE_ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REVUE_TIER_OVERRIDE: ${{ vars.REVUE_TIER_OVERRIDE }}
          GITHUB_TOKEN: ${{ secrets.REVUE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          APP_ENV: staging
          REVUE_METRICS_ENABLED: "1"
        run: |
          echo "[revue] Starting AI code review..."
          PYTHONPATH="$(pwd)/src" python3 -u src/revue/cli.py review \
            --diff /tmp/revue_pr.diff \
            --platform github \
            --pr-id "${{ github.event.pull_request.number }}" \
            --config .revue.yml \
            --comment-style per-issue \
            --pr-description-file /tmp/revue_pr_description.txt
          echo "[revue] Review complete"

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: revue-metrics
          path: .revue/metrics.jsonl
          if-no-files-found: ignore
