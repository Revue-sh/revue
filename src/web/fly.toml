app = "revue-io"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  DATABASE_PATH = "/data/revue.db"

[mounts]
  source = "revue_data"
  destination = "/data"

# REVUE-362: Fly's managed Prometheus scrapes the app's /metrics endpoint.
# Series land under the org Prometheus and feed the Grafana alert rules +
# dashboard in src/web/infra/observability/. See docs/runbooks/activate-observability.md.
[metrics]
  port = 8080
  path = "/metrics"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
