app = "revue-staging"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "development"
  DATABASE_PATH = "/data/revue.db"
  APP_BASE_URL = "https://staging.revue.sh"

[mounts]
  source = "revue_data_staging"
  destination = "/data"

# REVUE-362: Fly's managed Prometheus scrapes the app's /metrics endpoint.
# Staging carries the same scrape config so alert/dashboard PromQL can be
# validated against staging before production. See
# docs/runbooks/activate-observability.md.
[metrics]
  port = 8080
  path = "/metrics"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
