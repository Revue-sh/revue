team:
  name: Quick Review
  id: team-quick
  icon: ⚡
  description: |
    Lightweight review for small, low-risk changes. Maya reviews code quality
    and Nova consolidates. Skips security and performance deep-dives.
    Fast and cost-effective for trivial diffs.
  when_to_use: |
    - Diffs < 50 changed lines
    - Minor fixes, typos, documentation tweaks
    - Non-security-sensitive files only
    - Security override must NOT be active
  timeout_seconds: 30

agents:
  primary:
    - maya
    - nova
    - vex
  secondary: []

triggers:
  languages: []
  file_patterns: []
  keywords: []
