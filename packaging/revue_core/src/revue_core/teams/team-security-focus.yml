team:
  name: Security Focus
  id: team-security-focus
  icon: 🔒
  description: |
    Security-first review team. Zara leads with OWASP Top 10 analysis.
    Activated automatically when security-sensitive keywords or file patterns
    are detected in the diff (security override).
  when_to_use: |
    - Auth, cryptography, secrets, JWT, SQL
    - Files matching *secret*, *password*, *token*, *auth*, *.env, *.sql
    - Security override is active (triggered automatically by Cleo)
  timeout_seconds: 90

agents:
  primary:
    - zara
    - cleo
    - nova
    - vex
  secondary: []

triggers:
  languages: []
  file_patterns:
    - "**/*.sql"
    - "**/.env"
    - "**/*secret*"
    - "**/*password*"
    - "**/*token*"
    - "**/*auth*"
    - "**/*.pem"
    - "**/*.key"
  keywords:
    - auth
    - password
    - token
    - jwt
    - encrypt
    - decrypt
    - sql
    - secret
    - api_key
    - credential
