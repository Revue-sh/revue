team:
  name: Kotlin Android Review
  id: team-kotlin-android
  icon: 🤖
  description: |
    Specialised review team for Kotlin Android applications. Covers Koin DI,
    Coroutines, Android lifecycle, Compose, and Room database patterns.
  when_to_use: |
    - Kotlin source files (*.kt, *.kts) with Android-specific concerns
    - Jetpack Compose UI code
    - Room database, ViewModel, LiveData, Flow patterns
    - Koin/Hilt dependency injection
  timeout_seconds: 90

agents:
  primary:
    - cleo
    - maya
    - nova
    - vex
  secondary:
    - zara
    - kai

triggers:
  languages:
    - kotlin
  file_patterns:
    - "**/*.kt"
    - "**/*.kts"
  keywords:
    - ViewModel
    - LiveData
    - Coroutine
    - Flow
    - Compose
    - Hilt
    - Koin
    - Room
    - "@Composable"
