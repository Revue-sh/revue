team:
  name: Python Review
  id: team-python
  icon: 🐍
  description: |
    Review team for Python services, APIs, scripts, and data pipelines.
    Covers Django/FastAPI/Flask patterns, SQL injection, type hints, and
    Python-specific code quality.
  when_to_use: |
    - Python source files (*.py)
    - Django, FastAPI, Flask applications
    - Data science / ML scripts
    - CLI tools and scripts
  timeout_seconds: 90

agents:
  primary:
    - cleo
    - maya
    - nova
    - vex
  secondary:
    - zara
    - kai

triggers:
  languages:
    - python
  file_patterns:
    - "**/*.py"
  keywords:
    - django
    - fastapi
    - flask
    - sqlalchemy
    - async
    - await
    - cursor
    - execute
