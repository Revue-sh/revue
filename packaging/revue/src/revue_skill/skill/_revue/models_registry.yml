# Per-model registry (REVUE-262).
#
# This file is the source of truth for built-in, Revue-supported models.
# Customers may extend or override entries via the `models:` section of
# their `.revue.yml` (see `merge_user_overrides` in `models_registry.py`).
#
# Knob reference:
#   provider                : openrouter | anthropic | openai | azure | custom
#   schema_mode             : output_config (Anthropic) | response_format (OpenAI-shaped)
#   schema_strict           : true => dispatcher refuses a "supported" model that loses strictness
#   tool_choice_first_turn  : auto | required | none
#   max_tokens_default      : default token cap for this model
#   tier                    : supported (Revue-vetted) | unsupported (customer-extended)

models:
  claude-sonnet-4-5-20250929:
    provider: anthropic
    schema_mode: output_config
    schema_strict: true
    tool_choice_first_turn: auto
    max_tokens_default: 4096
    tier: supported

  claude-haiku-4-5-20251001:
    provider: anthropic
    schema_mode: output_config
    schema_strict: true
    tool_choice_first_turn: auto
    max_tokens_default: 2048
    tier: supported

  qwen/qwen3-coder-next:
    provider: openrouter
    schema_mode: response_format
    schema_strict: true
    tool_choice_first_turn: required
    max_tokens_default: 2048
    tier: supported

  deepseek/deepseek-v4-pro:
    provider: openrouter
    schema_mode: response_format
    schema_strict: true
    tool_choice_first_turn: required
    max_tokens_default: 2048
    tier: supported
    # REVUE-324 — Vex Option C reasoning channel.
    # DeepSeek emits visible chain-of-thought into the content channel under
    # strict json_schema mode, truncating the trailing verdict JSON. Routing
    # CoT to the separate reasoning channel and relaxing the response_format
    # to json_object preserves the verdict shape. Scope-gated to DeepSeek
    # only — every other entry inherits the no-op default.
    reasoning_assembler: deepseek_v4
    reasoning_mode: separate_channel
    reasoning_param:
      enabled: true
      effort: high
    schema_mode_when_reasoning: json_object
