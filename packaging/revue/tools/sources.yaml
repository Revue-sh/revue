# Vendor manifest for the revue skill package
#
# Used by tools/vendor_sources.py to copy source-of-truth files into the wheel
# build tree at packaging/revue/src/revue_skill/{skill,vendored}/.
#
# Why a manifest? The skill bundle ships standalone, but the production code
# lives in packaging/revue_core/src/revue_core/ and scripts/. To avoid silent
# drift, we (a) record the canonical paths here, (b) copy them at build time,
# (c) assert in tests/test_vendored_sources_in_sync.py that the in-tree copy
# still matches the source-of-truth file. Drift fails CI.
#
# REVUE-310: source-of-truth migrated from src/revue/ to packaging/revue_core/
# after the revue_core extraction. Import rewrites updated to match the new
# `from revue_core.*` import pattern used in the canonical sources.

skill:
  - source: .claude/skills/revue/SKILL.md
    target: src/revue_skill/skill/SKILL.md
  - source: scripts/local_run.py
    target: src/revue_skill/skill/local_run.py
    rewrite_imports:
      # Partial-vendoring: ONLY these three prefixes are rewritten to
      # revue_skill.vendored.*. Every other `from revue_core.X` import in
      # local_run.py (pipeline, agent_loader, diff_parser, models, comments.*,
      # core.log, core.logging_channels …) is left as-is and resolves at
      # runtime against the pip-installed revue_core. That is why
      # packaging/revue/pyproject.toml declares revue_core as a runtime dep.
      # See test_skill_wheel_requires_revue_core.py for the contract.
      - from: "from revue_core.comments.position_adapter"
        to: "from revue_skill.vendored.position_adapter"
      - from: "from revue_core.core.terminal_state"
        to: "from revue_skill.vendored.terminal_state"
      - from: "from positioning.adapters"
        to: "from revue_skill.vendored.positioning_adapters"
      # REVUE-370 (Codex H2): scripts/local_run.py honours
      # REVUE_SKIP_LICENCE_CHECK=1 as a developer convenience that
      # short-circuits the licence gate. A paying customer who set the same
      # env var against the shipped wheel could issue unlimited free reviews.
      # Strip BOTH the executable bypass AND every textual reference to the
      # env-var name at vendor time so the wheel always enforces the licence —
      # the source-tree copy keeps the bypass for local dev. The
      # test_vendored_source_text_strips_skip_env_var guard asserts the literal
      # is absent from the vendored module, so the replacement text below must
      # not name it either. Pair test: test_env_var_bypass_removed_in_wheel.
      - from: "    if os.environ.get(\"REVUE_SKIP_LICENCE_CHECK\") == \"1\":\n        return 0\n"
        to: "    # REVUE-370: the developer env-var bypass is stripped at vendor\n    # time — the shipped wheel must enforce the licence gate regardless of\n    # the environment. See packaging/revue/tools/sources.yaml.\n"
      # REVUE-370: the docstring still advertised the env-var bypass, which is
      # both false (the wheel no longer honours it) and a literal match for the
      # strip guard. Rewrite it to describe the wheel's actual behaviour.
      - from: "    contract in ``revue_skill/validate.py``. Honours\n    ``REVUE_SKIP_LICENCE_CHECK=1`` for tests and local development against\n    in-tree code (the published Nuitka binary's threat model elsewhere\n    handles this).\n"
        to: "    contract in ``revue_skill/validate.py``. The published wheel always\n    enforces the licence gate; the source-tree developer bypass is stripped\n    at vendor time (see packaging/revue/tools/sources.yaml).\n"
      # REVUE-278: the dev script tolerates a missing revue_skill.validate
      # because it runs from the source tree where the validate module may
      # not be on sys.path. The vendored copy inside the Nuitka-compiled
      # wheel MUST NOT tolerate this — ImportError-as-bypass would let an
      # attacker who removed or corrupted validate.so issue themselves
      # unlimited reviews. Swap the dev bypass for a hard-fail at vendor
      # time. See tests/test_local_run_gate.py::test_validate_import_failure_does_not_bypass
      # and build_nuitka.py:COMPILE_ROOTS.
      # NOTE: the from/to strings are 4-space indented (function-body level)
      # to match the literal text in scripts/local_run.py. Using double-quoted
      # YAML with explicit \n escapes avoids ambiguity with block-scalar
      # indent stripping rules.
      - from: "    try:\n        from revue_skill.validate import validate_licence\n    except ImportError:\n        # Source-tree mode: this script is being run from scripts/local_run.py\n        # without the published wheel installed. The wheel-only validation\n        # module isn't available; treat the same as REVUE_SKIP_LICENCE_CHECK.\n        return 0"
        to: "    # Wheel mode: ImportError MUST hard-fail. A silent bypass on\n    # missing validate.so is a licence-bypass exploit — see the\n    # rewrite_imports note in packaging/revue/tools/sources.yaml.\n    try:\n        from revue_skill.validate import validate_licence\n    except ImportError as exc:\n        sys.stderr.write(\n            \"error: Revue installation appears corrupt \"\n            f\"(could not load revue_skill.validate: {exc}). \"\n            \"Reinstall the revue wheel from https://revue.sh/install.\\n\"\n        )\n        return 8"
      # REVUE-369 H1 (Codex finding): in source-tree mode REPO_ROOT is the
      # revue.io checkout root. In the wheel it would resolve to the
      # installed `revue_skill/` package dir — wrong: git diff would run in
      # the wheel, and _revue/agents/ paths would resolve to non-existent
      # locations. Rewrite to: REPO_ROOT = the customer's git checkout
      # (via `git rev-parse --show-toplevel`, falling back to cwd) and
      # introduce WHEEL_ASSETS_DIR for bundled assets like _revue/agents.
      - from: "REPO_ROOT = Path(__file__).resolve().parent.parent\nsys.path.insert(0, str(REPO_ROOT / \"src\"))\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\nsys.path.insert(0, str(REPO_ROOT))  # for _revue package"
        to: "# REVUE-369: split source-tree REPO_ROOT into two concepts:\n# - REPO_ROOT  = customer's git checkout (where `git diff` runs)\n# - WHEEL_ASSETS_DIR = where bundled assets (_revue/agents/, etc.) live\nWHEEL_ASSETS_DIR = Path(__file__).resolve().parent  # revue_skill/skill/\ntry:\n    import subprocess as _sp\n    _toplevel = _sp.run(\n        [\"git\", \"rev-parse\", \"--show-toplevel\"],\n        capture_output=True, text=True, check=True,\n    ).stdout.strip()\n    REPO_ROOT = Path(_toplevel)\nexcept Exception:\n    REPO_ROOT = Path.cwd()"
      # Redirect bundled-asset lookups to the wheel directory
      - from: "str(REPO_ROOT / \"_revue/agents\")"
        to: "str(WHEEL_ASSETS_DIR / \"_revue/agents\")"

vendored:
  - source: packaging/revue_core/src/revue_core/comments/position_adapter.py
    target: src/revue_skill/vendored/position_adapter.py
    rewrite_imports:
      - from: "from revue_core.core.logging_channels"
        to: "from revue_skill.vendored.logging_channels"
  - source: packaging/revue_core/src/revue_core/core/terminal_state.py
    target: src/revue_skill/vendored/terminal_state.py
    rewrite_imports:
      - from: "from .finding_schema"
        to: "from revue_skill.vendored.finding_schema"
  - source: packaging/revue_core/src/revue_core/core/logging_channels.py
    target: src/revue_skill/vendored/logging_channels.py
    rewrite_imports:
      - from: "from revue_core.core.display"
        to: "from revue_skill.vendored.display"
      - from: "from revue_core.core.log"
        to: "from revue_skill.vendored.log"
  - source: packaging/revue_core/src/revue_core/core/finding_schema.py
    target: src/revue_skill/vendored/finding_schema.py
  - source: packaging/revue_core/src/revue_core/core/display.py
    target: src/revue_skill/vendored/display.py
  - source: packaging/revue_core/src/revue_core/core/log.py
    target: src/revue_skill/vendored/log.py
  - source: scripts/positioning/__init__.py
    target: src/revue_skill/vendored/positioning_adapters/__init__.py
    rewrite_imports:
      - from: "from revue_core.comments.position_adapter"
        to: "from revue_skill.vendored.position_adapter"
  - source: scripts/positioning/adapters.py
    target: src/revue_skill/vendored/positioning_adapters/adapters.py
    rewrite_imports:
      - from: "from revue_core.comments.position_adapter"
        to: "from revue_skill.vendored.position_adapter"
  - source: scripts/positioning/bitbucket.py
    target: src/revue_skill/vendored/positioning_adapters/bitbucket.py
  - source: scripts/positioning/github.py
    target: src/revue_skill/vendored/positioning_adapters/github.py
  - source: scripts/positioning/gitlab.py
    target: src/revue_skill/vendored/positioning_adapters/gitlab.py
  - source: scripts/positioning/helpers.py
    target: src/revue_skill/vendored/positioning_adapters/helpers.py
  - source: scripts/positioning/protocol.py
    target: src/revue_skill/vendored/positioning_adapters/protocol.py

# Agent prompts and the orchestration registry that local_run.py loads at runtime.
# All entries under _revue/ ship with the wheel so the skill works offline within
# the licence cache window.
agent_prompts:
  - source_dir: _revue/agents
    target_dir: src/revue_skill/skill/_revue/agents
  - source_dir: _revue/adapters
    target_dir: src/revue_skill/skill/_revue/adapters
  - source_dir: _revue/clients
    target_dir: src/revue_skill/skill/_revue/clients
  - source: _revue/config.yaml
    target: src/revue_skill/skill/_revue/config.yaml
  - source: _revue/models_registry.yml
    target: src/revue_skill/skill/_revue/models_registry.yml
