stages:
  - test
  - review

# ── Unit tests ────────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  image: python:3.12-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    # Mirror bitbucket-pipelines.yml `run-tests`: install all three packages
    # (revue_core editable first so revue-ci/revue resolve the local copy, not
    # PyPI), then exercise each suite. git is needed by REVUE-369 customer-path
    # coverage. The monorepo split moved code out of the old flat src/revue/.
    - apt-get update -qq && apt-get install -y -qq git
    - pip install --quiet -r requirements-ci.txt
    - pip install --quiet -e packaging/revue_core/ -e packaging/revue-ci/ -e packaging/revue/
    - python3 -m pytest packaging/revue_core/tests/ -q --rootdir=packaging/revue_core
    - python3 -m pytest packaging/revue-ci/tests/ -q --rootdir=packaging/revue-ci
    - python3 -m pytest packaging/revue/tests/ -q --rootdir=packaging/revue
    - python3 -m pytest tests/ --ignore=tests/integration -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Revue AI Code Review ───────────────────────────────────────────────────
revue-review:
  stage: review
  image: python:3.12-slim
  cache:
    - key: pip-$CI_COMMIT_REF_SLUG
      paths:
        - .pip-cache/
    - key: revue-state-$CI_MERGE_REQUEST_IID
      paths:
        - .revue/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
    APP_ENV: staging
    GIT_DEPTH: "0"
    REPOSITORY: $CI_PROJECT_PATH
    REVUE_METRICS_ENABLED: "1"
    REVUE_LOG_LEVEL: "DEBUG"
  allow_failure: true
  artifacts:
    when: always
    paths:
      - .revue/metrics.jsonl
    expire_in: 30 days
  script:
    - apt-get update -qq && apt-get install -y -qq git curl
    # Install the revue-ci console script (post monorepo-split). revue-ci's
    # runtime deps live in requirements-ci.txt; revue_core must install editable
    # first so the revue_core~=0.1.0 pin resolves against local source, not PyPI.
    - pip install --quiet -r requirements-ci.txt
    - pip install --quiet -e packaging/revue_core/ -e packaging/revue-ci/

    # Generate diff using GitLab's computed MR diff base (correct regardless of mirror state)
    - git diff $CI_MERGE_REQUEST_DIFF_BASE_SHA HEAD > /tmp/revue_pr.diff
    - echo "[revue] Diff size $(wc -l < /tmp/revue_pr.diff) lines"

    # Fetch MR description for context filtering
    - |
      curl -sf \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" \
        | python3 -c "import json,sys; print(json.load(sys.stdin).get('description',''))" \
        > /tmp/revue_mr_description.txt \
      && echo "[revue] MR description fetched ($(wc -c < /tmp/revue_mr_description.txt) bytes)" \
      || { echo ""; echo "========================================================================"; echo "‼️  WARNING: MR DESCRIPTION COULD NOT BE FETCHED"; echo "⚠️  THE REVIEW WILL PROCEED WITHOUT AUTHOR CONTEXT."; echo "⚠️  REVIEW QUALITY MAY BE REDUCED."; echo "⚠️  CHECK: GITLAB_TOKEN IS SET CORRECTLY."; echo "========================================================================"; echo ""; }

    # Validate config
    - revue-ci validate --config .revue.yml

    # Run AI code review.
    # This mirror overrides .revue.yml's provider (openrouter) with the project's
    # AI_PROVIDER/AI_MODEL CI variables (openai) via --provider/--model.
    # key_resolver resolves the provider default env var (OPENAI_API_KEY), which
    # GitLab injects from the project CI/CD variable of the same name.
    # --platform gitlab reads GITLAB_TOKEN + CI_PROJECT_PATH from the env.
    - echo "[revue] Starting AI code review (provider=$AI_PROVIDER model=$AI_MODEL)..."
    - |
      revue-ci review \
        --diff /tmp/revue_pr.diff \
        --platform gitlab \
        --pr-id "$CI_MERGE_REQUEST_IID" \
        --config .revue.yml \
        --provider "$AI_PROVIDER" \
        --model "$AI_MODEL" \
        --comment-style per-issue \
        --pr-description-file /tmp/revue_mr_description.txt
    - echo "[revue] Review complete"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
