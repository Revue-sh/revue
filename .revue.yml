ai:
  api_key_env: REVUE_ANTHROPIC_API_KEY
  model: claude-haiku-4-5-20251001
  synthesis_model: claude-haiku-4-5-20251001
  provider: anthropic
noise_filters:
  allowed_patterns:
  - applies_to:
    - leo
    - maya
    pattern: _def attribute access on LoadedAgent
    rationale: Internal implementation detail, no public API
  - applies_to:
    - maya
    pattern: Inline lazy httpx import in pr_description_adapter
    rationale: Intentional lazy loading pattern, now replaced with module-level import
  - pattern: test_vcs_adapter.py deletion
    rationale: Test coverage consolidated into test_vcs_adapters.py
  - applies_to:
    - leo
    - maya
    pattern: Bare except in _inject_pr_context
    rationale: Intentional catch-all, PR context injection must not crash the review
      loop
  - applies_to:
    - kai
    - leo
    pattern: N+1 query pattern acceptable for small datasets with deferred optimization
    rationale: For current PR sizes (typically fewer than 50 unresolved comments),
      the N+1 query overhead is acceptable. Batch-fetch will be introduced once won't-fix
      tracking is stable in production.
  - applies_to:
    - maya
    pattern: Testing project configuration files directly when parser validation already
      exists
    rationale: Parser tests (`test_yaml_parser_rejects_invalid_pattern`, `test_yaml_parser_rejects_non_string_pattern`,
      `test_yaml_parser_reads_allowed_patterns`) already validate configuration behavior.
      Testing the project's own .revue.yml asserts file contents rather than code
      behavior, which doesn't justify the maintenance cost.
  - applies_to:
    - leo
    - maya
    pattern: Using allowed_patterns for technical debt acknowledgment and policy decisions
    rationale: The `allowed_patterns` feature is designed to record intentional policy
      decisions with rationale. This use case (N+1 query pattern acceptable for small
      datasets) is explicitly covered by REVUE-112. Additional features like `expires`
      fields are post-MVP scope.
  - pattern: TODO comments in configuration files when disallowed_patterns targets
      production code only
    rationale: The disallowed_patterns rule explicitly covers 'TODO comments in production
      code'. Configuration files like .revue.yml are not production code. The TODO
      in question was also stripped by the YAML reformatter and does not appear in
      the current branch diff.
  - pattern: Glob patterns or YAML values in .revue.yml flagged as code-quality issues
    rationale: Entries in .revue.yml (ignore_patterns globs, model names, env var
      references, numeric thresholds) are operational configuration values, not source
      code constructs. Code-quality rules such as 'TODO in production code', 'missing
      error handling', or 'lacks documentation' do not apply to YAML config files.
  - pattern: noise_filters section should be documented
    rationale: noise_filters is fully documented in docs/revue-yml-reference.md with
      field tables, filter name reference, allowed_patterns/disallowed_patterns schema,
      applies_to agent scoping, and annotated examples. This finding is a false positive.
  - pattern: TODO finding where the exact string 'TODO' or 'FIXME' does not appear
      in the flagged line
    rationale: The disallowed_patterns TODO rule must only fire when the literal string
      'TODO' or `TO DO` or 'FIXME' (case-insensitive) is present in the flagged line
      or an adjacent code comment. The word 'to' in docstring prose (e.g. 'parameter
      to ReviewPipeline.run()') is not a TODO comment. Never generate a TODO finding
      from partial word matches or inferred intent.
  - applies_to:
    - kai
    pattern: time.sleep blocking the event loop or synchronous I/O in async context
    rationale: Revue's pipeline is deliberately synchronous (sequential agents, retry
      backoff with time.sleep). There is no async event loop in scope. asyncio.sleep
      would be wrong here.
  - applies_to:
    - kai
    pattern: Repeated expensive computations in summary generation
    rationale: Summary generation runs once per review run on a small dataset (one
      summary comment). Caching adds complexity for zero measurable benefit.
  - applies_to:
    - maya
    - zara
    pattern: Logging AI provider name or model name may expose sensitive information
    rationale: provider (e.g. 'openai') and model (e.g. 'gpt-4o-mini') are public
      configuration metadata, not credentials. The API key is resolved separately
      by key_resolver.py and is never logged. No masking is needed.
  - applies_to:
    - maya
    pattern: Removing --provider/--model CLI flags may confuse users who expect command-line
      configuration
    rationale: A comment is present in every CI config explaining that provider and
      model are now read from .revue.yml. The change is intentional and documented
      inline at the point of removal.
  - pattern: Omit error handling for operations whose preconditions are enforced by
      earlier build steps
    rationale: 'The developer has acknowledged the finding and provided a specific,
      convincing reason: the file''s existence is guaranteed by the prior pip install
      step, which fails fatally if the package is malformed. Error handling at this
      point would be unreachable code. This is a valid, intentional choice for this
      build script context.'
  - pattern: Handle tool-specific constraints by excluding problematic files from
      the main loop and processing them separately
    rationale: 'The developer has acknowledged the finding and provided a clear, specific
      reason: Nuitka''s `--module` flag has a documented fatal error when passed an
      `__init__.py` path. The sequential nature of the build eliminates the race condition
      concern. This is an intentional, correct workaround for a tool limitation.'
  - pattern: Future-dated verification timestamps in architecture documentation
    rationale: 'The developer has acknowledged the finding and provided a clear, specific
      reason: the temporal order reflects the actual workflow (implementation precedes
      verification). This is an intentional, legitimate choice for documenting staged
      work in architecture records.'
  - pattern: Fence detection startswith guard is sufficient because valid JSON never
      begins with triple-backtick
    rationale: In _parse_thread_decisions, the check clean.startswith("```") creates
      exhaustive, non-overlapping branches — valid JSON starts with { or [, never
      with ```. Any finding claiming the plain-JSON path could be triggered for a
      fenced response is a false positive. Test coverage confirms the plain-JSON path
      is unaffected.
  - pattern: Forward scan for closing fence is safe because JSON encoding escapes
      backtick sequences in string values
    rationale: In _parse_thread_decisions, the close_idx forward scan identifies a
      bare ``` line as the closing fence. JSON string encoding guarantees that triple-backticks
      inside string values are escaped, never emitted as raw characters. A bare ```
      line can therefore only be a fence marker, making the scan unambiguous and correct.
  - pattern: A permissive parser that returns a safe default (no release) for unrecognized
      or malformed input is acceptable when the failure mode is a recoverable false
      negative rather than a false positive that could ship incorrect code.
    rationale: 'Strict validation in a release-determination tool creates a high cost:
      formatting errors block merges even though they don''t affect code safety. By
      contrast, a permissive parser that conservatively returns ''no release'' for
      anything it cannot confidently parse ensures that only well-formed conventional
      commits trigger automated bumps. False negatives (a valid fix that doesn''t
      bump) are recoverable via manual tagging and pose no risk to production. This
      trade-off is justified because the cost of blocking merges outweighs the cost
      of occasional manual intervention.'
  disable: []
  disallowed_patterns:
  - pattern: TODO comments in production code
    rationale: TODOs should be tracked as Jira tickets
  low_confidence_threshold: 0.5
output:
  comment_style: per-issue
consolidation:
  proximity_lines: 3
  max_group_size: 3
rating:
  floor: 1.0
  weights:
    high: 1.5
    info: 0.0
    low: 0.05
    medium: 0.3
review:
  agent_timeout_seconds: 240
  ignore_patterns:
  - .revue.yml
  - '*.lock'
  - package-lock.json
  - '*.min.js'
  - dist/**
  - '*.whl'
  - .claude/**
  max_diff_lines: 15000
  max_parallel_agents: 2
  min_confidence: 70
  retry_on_rate_limit: true
version: '1'
