# .revue.yml — Revue.io configuration
version: "1"

ai:
  provider: anthropic
  model: claude-sonnet-4-5
  api_key_env: AI_API_KEY

review:
  max_diff_lines: 10000  # TODO: REVUE-96 - make this dynamic based on model context window
  min_confidence: 70
  agent_timeout_seconds: 240
  max_parallel_agents: 1      # 1 = sequential (safe default). Raise only if your Anthropic plan has high TPM limits.
  retry_on_rate_limit: true   # Retry with backoff on 429 using the retry-after header (~3 min wait for 30k TPM tier).
  ignore_patterns:
    - "*.lock"
    - "package-lock.json"
    - "*.min.js"
    - "dist/**"
    - "*.whl"

output:
  comment_style: per-issue   # "per-issue" = one inline comment per finding (default)
                              # "summary"   = one grouped comment per file

noise_filters:
  disable: []
  low_confidence_threshold: 0.5
  allowed_patterns:
    - pattern: "_def attribute access on LoadedAgent"
      rationale: "Internal implementation detail, no public API"
    - pattern: "Inline lazy httpx import in pr_description_adapter"
      rationale: "Intentional lazy loading pattern, now replaced with module-level import"
    - pattern: "test_vcs_adapter.py deletion"
      rationale: "Test coverage consolidated into test_vcs_adapters.py"
    - pattern: "Bare except in _inject_pr_context"
      rationale: "Intentional catch-all, PR context injection must not crash the review loop"
    - pattern: "N+1 query pattern acceptable for small datasets with deferred optimization"
      rationale: "For current PR sizes (typically fewer than 50 unresolved comments),
        the N+1 query overhead is acceptable. Batch-fetch will be introduced once won't-fix
        tracking is stable in production."
    - pattern: "Testing project configuration files directly when parser validation already
        exists"
      rationale: "Parser tests (`test_yaml_parser_rejects_invalid_pattern`, `test_yaml_parser_rejects_non_string_pattern`,
        `test_yaml_parser_reads_allowed_patterns`) already validate configuration behavior.
        Testing the project's own .revue.yml asserts file contents rather than code
        behavior, which doesn't justify the maintenance cost."
    - pattern: "Using allowed_patterns for technical debt acknowledgment and policy decisions"
      rationale: "The `allowed_patterns` feature is designed to record intentional policy
        decisions with rationale. This use case (N+1 query pattern acceptable for small
        datasets) is explicitly covered by REVUE-112. Additional features like `expires`
        fields are post-MVP scope."
    - pattern: "TODO comments in configuration files when disallowed_patterns targets
        production code only"
      rationale: "The disallowed_patterns rule explicitly covers 'TODO comments in production
        code'. Configuration files like .revue.yml are not production code. The TODO
        in question was also stripped by the YAML reformatter and does not appear in
        the current branch diff."
  disallowed_patterns:
    - pattern: "TODO comments in production code"
      rationale: "TODOs should be tracked as Jira tickets"
