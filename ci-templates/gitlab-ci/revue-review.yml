# Revue.io Code Review Template
# Add to your .gitlab-ci.yml:
#   include:
#     - local: ci-templates/gitlab-ci/revue-review.yml
#
# Or from a remote source:
#   include:
#     - remote: https://raw.githubusercontent.com/your-org/revue-templates/main/gitlab-ci/revue-review.yml

.revue-review:
  stage: test
  image: python:3.12-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - pip install --quiet revue-io
    - apt-get update -qq && apt-get install -y -qq curl jq
  script:
    # Fetch MR diff
    - |
      curl --silent --fail \
        --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/changes" \
        | jq -r ".changes[].diff" > mr.diff

    # Run Revue review (failure does not fail the pipeline)
    - revue review --diff mr.diff --format json > review.json || true

    # Post review comments to the MR
    - |
      if [ -f review.json ]; then
        python3 "$(dirname "$0")/post_review.py"
      else
        echo "No review.json produced — skipping comment posting"
      fi
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  artifacts:
    reports:
      junit: review-junit.xml
    paths:
      - review.json
    when: always
    expire_in: 7 days

revue:
  extends: .revue-review
